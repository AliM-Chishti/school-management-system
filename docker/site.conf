# Nginx site configuration for Laravel School Management System
server {
    listen ${PORT:-8000} default_server;
    listen [::]:${PORT:-8000} default_server;

    server_name _;

    # Set correct root for Laravel public directory
    root /app/public;
    index index.php;

    # Charset
    charset utf-8;

    # Logs
    access_log /var/log/nginx/laravel_access.log;
    error_log /var/log/nginx/laravel_error.log;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Handle all requests through Laravel's public/index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Health check endpoint
    location = /health.php {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        access_log off;
    }

    # PHP processing for .php files
    location ~ \.php$ {
        # Check if file exists
        try_files $uri =404;

        # Use PHP-FPM socket
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        
        # Include standard FastCGI parameters
        include fastcgi_params;

        # Laravel specific headers
        fastcgi_param APP_ENV production;
        fastcgi_param SCRIPT_NAME /index.php;

        # Timeout settings
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout 60s;
        fastcgi_read_timeout 60s;
    }

    # Deny access to sensitive files
    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~ /(?:app|bootstrap|config|database|resources|storage|tests|vendor)/ {
        deny all;
    }

    # Serve static assets with cache headers
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
