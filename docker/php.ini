; PHP configuration for Laravel production environment

; Memory limit
memory_limit = 256M

; Maximum execution time (seconds)
max_execution_time = 300

; Maximum input time (seconds)
max_input_time = 300

; Post data size
post_max_size = 20M

; Upload file size
upload_max_filesize = 20M

; Display errors (off in production)
display_errors = Off
display_startup_errors = Off

; Error reporting
error_reporting = E_ALL
log_errors = On

; Error log
error_log = /proc/self/fd/2

; Date timezone
date.timezone = UTC

; File uploads
file_uploads = On

; Disable functions that could be security risks
disable_functions = exec, passthru, shell_exec, system, proc_open, popen, curl_exec, curl_multi_exec, parse_ini_file, show_source

; Session configuration
session.save_handler = files
session.use_strict_mode = 1
session.use_cookies = 1
session.use_only_cookies = 1
session.cookie_httponly = 1
session.cookie_secure = 0

; OPcache configuration for performance
opcache.enable = 1
opcache.enable_cli = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = 10000
opcache.revalidate_freq = 0
opcache.validate_timestamps = 0

; Realpath cache
realpath_cache_size = 4096K
realpath_cache_ttl = 600

; Disable extensions known to cause issues in containerized environments
; (Most are commented out as they're typically needed)
